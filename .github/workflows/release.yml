name: Release

on:
  release:
    types: [published]

jobs:
  build-artifact:
    name: Build plugin artifact
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build distributable artifact
        run: npm run build:dist -- --version=${{ github.event.release.tag_name }}

      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "dist/ash-nazg-${{ github.event.release.tag_name }}.zip" \
            --clobber
