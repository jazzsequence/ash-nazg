name: E2E & Accessibility Tests

# GitHub Pages Setup Required:
# 1. Repository Settings → Pages → Deploy from branch → gh-pages / root
# 2. Reports published at: https://jazzsequence.github.io/ash-nazg/reports/{run_id}
#
# Required secrets: PANTHEON_MACHINE_TOKEN, PANTHEON_SITE_UUID
# The machine token must have permission to create and delete multidevs.
# Rotate it if ever exposed.
#
# Multidev lifecycle:
#   PR open/sync/reopen → create e2e-{pr} multidev, run tests
#   PR close            → delete e2e-{pr} multidev

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:
    inputs:
      env_name:
        description: 'Pantheon environment to test against (default: dev)'
        required: false
        default: 'dev'

permissions:
  contents: write
  pages: write
  id-token: write

env:
  # Multidev name: e2e-{pr_number}, max 11 chars. Falls back to dev for
  # manual workflow_dispatch runs without a PR.
  E2E_ENV_NAME: ${{ github.event_name == 'pull_request' && format('e2e-{0}', github.event.pull_request.number) || inputs.env_name || 'dev' }}

jobs:
  # ── Delete multidev on PR close ──────────────────────────────────────────────
  cleanup:
    name: Delete E2E multidev
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Delete multidev
        env:
          PANTHEON_MACHINE_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
          PANTHEON_SITE_UUID: ${{ secrets.PANTHEON_SITE_UUID }}
        run: bash bin/manage-e2e-multidev.sh delete "${{ env.E2E_ENV_NAME }}"

  # ── Create multidev + run tests ──────────────────────────────────────────────
  playwright:
    name: Playwright (a11y + functional)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event.action != 'closed'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Create E2E multidev
        if: github.event_name == 'pull_request'
        env:
          PANTHEON_MACHINE_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
          PANTHEON_SITE_UUID: ${{ secrets.PANTHEON_SITE_UUID }}
        run: bash bin/manage-e2e-multidev.sh create "${{ env.E2E_ENV_NAME }}"

      - name: Generate E2E blueprint
        env:
          PANTHEON_MACHINE_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
          PANTHEON_SITE_UUID: ${{ secrets.PANTHEON_SITE_UUID }}
          PANTHEON_ENV_NAME: ${{ env.E2E_ENV_NAME }}
        run: bash bin/generate-e2e-blueprint.sh

      - name: Prepare Playwright auth directory
        run: |
          mkdir -p tests/e2e/.auth
          echo '{"cookies":[],"origins":[]}' > tests/e2e/.auth/admin.json

      - name: Start WP Playground
        run: |
          # Note: the worker count warning ("fewer than 6 workers") is expected
          # on standard GitHub Actions runners (4 CPUs → 3 workers). It is
          # informational only — Playwright runs sequentially (workers: 1) so
          # there is no concurrent load that would trigger file-lock deadlock.
          npx @wp-playground/cli@latest server \
            --auto-mount \
            --blueprint=tests/e2e/blueprint.generated.json \
            --port=9400 &

          echo "Waiting for WP Playground to be ready..."
          timeout 120 bash -c \
            'until curl -sf http://localhost:9400/wp-login.php -o /dev/null; do sleep 3; done'
          echo "WP Playground is ready."

      - name: Run Playwright tests
        id: e2e-tests
        continue-on-error: true
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:9400
        run: npx playwright test

      - name: Remove generated blueprint
        if: always()
        run: rm -f tests/e2e/blueprint.generated.json

      - name: Deploy Playwright report to GitHub Pages
        if: always()
        continue-on-error: true
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          destination_dir: reports/${{ github.run_id }}
          keep_files: true
          force_push: true

      - name: Report status
        if: always()
        run: |
          REPORT_URL="https://jazzsequence.github.io/ash-nazg/reports/${{ github.run_id }}"
          echo "### E2E & A11y Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** \`${{ env.E2E_ENV_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests:** ${{ steps.e2e-tests.outcome == 'success' && '✅ Passed' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 [View Playwright Report](${REPORT_URL})" >> $GITHUB_STEP_SUMMARY

      - name: Fail workflow if tests failed
        if: steps.e2e-tests.outcome != 'success'
        run: exit 1
